<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect the Dots</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0ede8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
new p5(function(p) {

  // ─── Dot data ────────────────────────────────────────────────────────────────
  // Coordinates are in a 700×700 design space.
  // type: 0 = normal (black), 1 = lift-pen (pink), 2 = multi-number (blue), 3 = both (purple)
  const RAW = [
    // [ x,   y,   word,        type ]
    [ 87,  166, "back",       0 ],  //  1
    [134,  166, "then",       0 ],  //  2
    [170,  161, "i",          0 ],  //  3
    [175,  125, "only",       0 ],  //  4
    [162,  100, "knew",       0 ],  //  5
    [123,   58, "css",        1 ],  //  6  ← pink / lift pen
    [193,  161, "i",          0 ],  //  7
    [205,  121, "and",        0 ],  //  8
    [205,   87, "html.",      0 ],  //  9
    [205,   40, "now",        0 ],  // 10
    [189,  163, "i",          0 ],  // 11
    [256,  163, "i",          0 ],  // 12
    [283,  178, "can",        1 ],  // 13  ← pink / lift pen
    [236,  237, "do",         0 ],  // 14
    [244,  317, "all",        0 ],  // 15
    [240,  412, "this!",      0 ],  // 16
    [244,  478, "glad",       0 ],  // 17
    [275,  539, "i",          0 ],  // 18
    [303,  591, "survived",   0 ],  // 19
    [272,  591, "this",       3 ],  // 20  ← purple / lift pen + multi-number
    [291,  629, "class",      0 ],  // 21
    [409,  634, "and",        0 ],  // 22
    [452,  620, "sam",        0 ],  // 23
    [448,  568, "allowed",    0 ],  // 24
    [382,  544, "silly",      0 ],  // 25
    [272,  591, "this",       2 ],  // 26  ← blue / multi-number  (same pos as 20)
    [417,  591, "projects",   0 ],  // 27
    [440,  549, "so",         0 ],  // 28
    [456,  497, "it",         0 ],  // 29
    [484,  412, "was",        0 ],  // 30
    [511,  307, "less",       1 ],  // 31  ← pink / lift pen
    [444,  241, "painful.",   0 ],  // 32
    [492,  227, "sorry",      0 ],  // 33
    [507,  203, "but",        0 ],  // 34
    [527,  142, "no",         0 ],  // 35
    [504,   90, "more",       1 ],  // 36  ← pink / lift pen
    [519,  182, "but",        0 ],  // 37
    [543,  194, "js",         0 ],  // 38
    [578,   97, "ever",       0 ],  // 39
    [566,  175, "again",      0 ],  // 40
    [601,  175, "please.",    0 ],  // 41
    [657,  148, "no",         0 ],  // 42
  ];

  // Dot indices (0-based) after which the pen is lifted.
  // The user must click the FIRST dot of the next segment to continue.
  const LIFT_AT = new Set([5, 12, 19, 30, 35]);

  // ─── State ───────────────────────────────────────────────────────────────────
  let dots      = [];       // scaled dot objects
  let conns     = [];       // committed lines  [{a, b}]
  let revealed  = new Set();
  let state     = 'wait';   // 'wait' | 'drag' | 'done'
  let step      = 0;        // which connection we are making: step → step+1
  let dragX     = 0;
  let dragY     = 0;
  let S         = 700;      // canvas size (square)

  // ─── Helpers ─────────────────────────────────────────────────────────────────
  function sc(v)  { return v * S / 700; }
  function dx(i)  { return sc(dots[i].rx); }
  function dy(i)  { return sc(dots[i].ry); }

  function dotColor(type) {
    if (type === 1) return p.color('#e8899a');   // pink
    if (type === 2) return p.color('#99b3e8');   // blue
    if (type === 3) return p.color('#c09ae8');   // purple
    return p.color('#1a1a1a');                   // black
  }

  // Small snap radius — tight enough that nearby dots don't interfere
  function snapR() { return sc(22); }

  // ─── Setup ───────────────────────────────────────────────────────────────────
  p.setup = function() {
    S = Math.min(p.windowWidth, p.windowHeight, 700);
    const cnv = p.createCanvas(S, S);
    cnv.style('display', 'block');
    p.textFont('Georgia');

    dots = RAW.map(([rx, ry, word, type]) => ({ rx, ry, word, type }));
  };

  p.windowResized = function() {
    S = Math.min(p.windowWidth, p.windowHeight, 700);
    p.resizeCanvas(S, S);
  };

  // ─── Draw ────────────────────────────────────────────────────────────────────
  p.draw = function() {
    p.background('#f0ede8');

    const lw = sc(1.5);

    // Committed lines
    p.strokeWeight(lw);
    p.stroke(200, 65, 65);
    for (const { a, b } of conns) {
      p.line(dx(a), dy(a), dx(b), dy(b));
    }

    // Live drag line
    if (state === 'drag') {
      p.stroke(200, 65, 65, 150);
      p.strokeWeight(lw);
      p.line(dx(step), dy(step), dragX, dragY);
    }

    // ── Dots ──
    for (let i = 0; i < dots.length; i++) {
      const d  = dots[i];
      const cx = dx(i);
      const cy = dy(i);
      const r  = sc(5);

      // Glow: current press target
      if (state === 'wait' && i === step) {
        const pulse = p.map(p.sin(p.frameCount * 0.09), -1, 1, 0.35, 1.0);
        p.noStroke();
        p.fill(255, 185, 0, pulse * 160);
        p.circle(cx, cy, sc(22));
      }

      // Glow: snap-target while dragging
      if (state === 'drag' && step + 1 < dots.length && i === step + 1) {
        const dist  = p.dist(dragX, dragY, cx, cy);
        const close = p.map(p.constrain(dist, 0, snapR()), 0, snapR(), 1, 0);
        p.noStroke();
        p.fill(80, 200, 120, 70 + close * 140);
        p.circle(cx, cy, sc(22));
      }

      // Dot circle
      p.noStroke();
      p.fill(dotColor(d.type));
      p.circle(cx, cy, r * 2);

      // Number label (upper-right of dot, small)
      p.fill('#1a1a1a');
      p.noStroke();
      p.textSize(sc(8.5));
      p.textAlign(p.LEFT, p.BOTTOM);
      p.text(i + 1, cx + r + sc(1.5), cy + sc(1));

      // Revealed word
      if (revealed.has(i)) {
        p.fill('#222');
        p.textSize(sc(9.5));
        p.textAlign(p.LEFT, p.TOP);
        p.text(d.word, cx + r + sc(2), cy + sc(2));
      }
    }

    // Prompt on first step
    if (state === 'wait' && step === 0 && conns.length === 0) {
      p.noStroke();
      p.fill(120, 120, 120, 200);
      p.textSize(sc(11));
      p.textAlign(p.CENTER, p.BOTTOM);
      p.text('press dot 1 to start', S / 2, S - sc(8));
    }

    // Done overlay
    if (state === 'done') {
      p.noStroke();
      p.fill(0, 0, 0, 185);
      p.rect(0, S / 2 - sc(45), S, sc(90));
      p.fill(255);
      p.textSize(sc(26));
      p.textAlign(p.CENTER, p.CENTER);
      p.text("IT'S OVER!!!!!", S / 2, S / 2);
    }
  };

  // ─── Interaction helpers ──────────────────────────────────────────────────────
  function tryPress(mx, my) {
    if (state !== 'wait') return;
    if (step >= dots.length - 1) return;
    if (p.dist(mx, my, dx(step), dy(step)) < snapR()) {
      revealed.add(step);
      state  = 'drag';
      dragX  = mx;
      dragY  = my;
    }
  }

  function tryRelease(mx, my) {
    if (state !== 'drag') return;
    const nxt = step + 1;
    if (nxt < dots.length && p.dist(mx, my, dx(nxt), dy(nxt)) < snapR()) {
      conns.push({ a: step, b: nxt });
      revealed.add(nxt);
      // If the dot we just arrived at is a lift-pen dot, the user will need
      // to press the first dot of the next segment (handled by incrementing step).
      step++;
      state = step >= dots.length - 1 ? 'done' : 'wait';
    } else {
      // Missed — cancel drag, user tries again from same source dot
      state = 'wait';
    }
  }

  // ─── Mouse ───────────────────────────────────────────────────────────────────
  p.mousePressed  = () => tryPress(p.mouseX, p.mouseY);
  p.mouseDragged  = () => { if (state === 'drag') { dragX = p.mouseX; dragY = p.mouseY; } };
  p.mouseReleased = () => tryRelease(p.mouseX, p.mouseY);

  // ─── Touch ───────────────────────────────────────────────────────────────────
  p.touchStarted = function() {
    if (p.touches.length) tryPress(p.touches[0].x, p.touches[0].y);
    return false;
  };
  p.touchMoved = function() {
    if (state === 'drag' && p.touches.length) {
      dragX = p.touches[0].x;
      dragY = p.touches[0].y;
    }
    return false;
  };
  p.touchEnded = function() {
    tryRelease(dragX, dragY);
    return false;
  };

});
</script>
</body>
</html>
